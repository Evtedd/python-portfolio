services:
  service:
    build: .
    env_file: .env
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hhtracker
      POSTGRES_USER: hhtracker
      POSTGRES_PASSWORD: hhtracker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
