services:
  api:
    build: .
    env_file: .env
    ports:
      - "8014:8000"
    depends_on:
      - postgres
      - redis
  worker:
    build: .
    env_file: .env
    command: ["python", "-m", "app.queue.worker"]
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: automation
      POSTGRES_USER: automation
      POSTGRES_PASSWORD: automation
    ports:
      - "54314:5432"
    volumes:
      - automation_pg:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "63714:6379"

volumes:
  automation_pg:
