<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Automation</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #f6f7f9; color: #1f2937; }
      header { padding: 18px 24px; background: #ffffff; border-bottom: 1px solid #d8dee9; }
      main { padding: 24px; max-width: 1100px; margin: 0 auto; display: grid; gap: 16px; }
      section { background: #ffffff; border: 1px solid #d8dee9; border-radius: 8px; padding: 16px; }
      textarea, input { width: 100%; box-sizing: border-box; font: inherit; padding: 10px; border: 1px solid #c8d0dc; border-radius: 6px; }
      button { border: 0; border-radius: 6px; background: #2563eb; color: white; padding: 10px 14px; cursor: pointer; }
      pre { white-space: pre-wrap; background: #111827; color: #f9fafb; padding: 12px; border-radius: 6px; overflow: auto; }
    </style>
  </head>
  <body>
    <header><strong>Automation</strong></header>
    <main>
      <section>
        <label>API key</label>
        <input id="key" type="password" value="change-me">
      </section>
      <section>
        <button onclick="loadFlows()">Обновить список</button>
        <pre id="output">[]</pre>
      </section>
      <section>
        <textarea id="flow" rows="14">{"name":"new-product","enabled":true,"trigger":{"type":"webhook","key":"new-product"},"steps":[{"name":"post","connector":"memory","settings":{},"input":{"text":"Новый товар {{event.name}}"}}]}</textarea>
        <button onclick="saveFlow()">Сохранить flow</button>
      </section>
    </main>
    <script>
      async function loadFlows() {
        const response = await fetch('/flows', {headers: {'X-API-Key': document.getElementById('key').value}});
        document.getElementById('output').textContent = JSON.stringify(await response.json(), null, 2);
      }
      async function saveFlow() {
        const response = await fetch('/flows', {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'X-API-Key': document.getElementById('key').value},
          body: document.getElementById('flow').value
        });
        document.getElementById('output').textContent = JSON.stringify(await response.json(), null, 2);
      }
    </script>
  </body>
</html>
