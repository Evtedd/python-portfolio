services:
  api:
    build: .
    env_file: .env
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8002:8000"
    depends_on:
      - postgres

  ui:
    build: .
    env_file: .env
    command: streamlit run app/ui/streamlit_app.py --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: matcher
      POSTGRES_USER: matcher
      POSTGRES_PASSWORD: matcher
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
