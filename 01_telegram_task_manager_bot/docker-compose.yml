services:
  bot:
    build: .
    env_file: .env
    depends_on:
      - postgres
    volumes:
      - ./data:/app/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskbot
      POSTGRES_USER: taskbot
      POSTGRES_PASSWORD: taskbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
